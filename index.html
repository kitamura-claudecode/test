<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダムポケモン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
  </div>

  <div class="container">
    <header>
      <h1>ランダムポケモン</h1>
      <p class="subtitle">ボタンをクリックしてランダムなポケモンを表示！</p>
    </header>

    <div class="card" id="card">
      <div class="initial-state" id="initialState">
        <div class="pokeball">
          <div class="pokeball-top"></div>
          <div class="pokeball-middle"></div>
          <div class="pokeball-bottom"></div>
          <div class="pokeball-button"></div>
        </div>
        <p>ボタンをクリック！</p>
      </div>

      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>

      <div class="pokemon-display hidden" id="pokemonDisplay">
        <div class="pokemon-header">
          <span class="pokemon-id" id="pokemonId">#001</span>
          <div class="type-badges" id="typeBadges"></div>
        </div>
        <div class="pokemon-img-wrap">
          <img class="pokemon-img" id="pokemonImg" src="" alt="" />
        </div>
        <h2 class="pokemon-name" id="pokemonName">Bulbasaur</h2>
        <div class="info-row">
          <div class="info-item">
            <span class="info-label">高さ</span>
            <span class="info-value" id="pokemonHeight">-</span>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <span class="info-label">重さ</span>
            <span class="info-value" id="pokemonWeight">-</span>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <span class="info-label">特性</span>
            <span class="info-value" id="pokemonAbility">-</span>
          </div>
        </div>
        <div class="stats-section">
          <div class="stats-title">基本ステータス</div>
          <div class="stats-grid" id="statsGrid"></div>
        </div>
      </div>
    </div>

    <button class="roll-btn" id="rollBtn">
      <span class="dice">🎲</span>
      ランダムに選ぶ
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
